<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkedIn Auto Liker</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <img src="icons/icon32.png" alt="LinkedIn Auto Liker" class="logo" />
        <div>
          <h1>LinkedIn Auto Liker</h1>
          <p class="subtitle">Start or stop the feed auto liker.</p>
        </div>
      </header>

      <div class="status-row">
        <span class="label">Status:</span>
        <span id="status" class="badge">Loading…</span>
      </div>

      <div class="actions">
        <button id="start" type="button" class="primary">Start</button>
        <button id="stop" type="button" class="ghost">Stop</button>
      </div>

      <p class="hint">Keep this tab focused on LinkedIn for best results.</p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
